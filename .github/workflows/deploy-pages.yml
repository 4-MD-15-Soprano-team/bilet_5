# Деплой на GitHub Pages с подстановкой Supabase из Secrets
# В настройках репозитория: Settings → Secrets and variables → Actions
# Добавьте: SUPABASE_URL и SUPABASE_ANON_KEY

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Supabase config from Secrets
        run: |
          cat > js/supabase-config.js << 'EOF'
          window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
