<svg width="232" height="95" viewBox="-12 -24 256 127" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="We are sysadmins" overflow="visible">
	<defs>
		<style>
			@media (prefers-reduced-motion: reduce) {
				.logo-anim-root,
				.logo-cell,
				.logo-text {
					animation: none !important;
				}
			}

			@keyframes logo-float {
				0%,
				100% {
					transform: translateY(0);
				}
				50% {
					transform: translateY(-4px);
				}
			}

			@keyframes cell-bob {
				0%,
				100% {
					transform: translateY(0) scale(1);
				}
				32% {
					transform: translateY(-4px) scale(1.06);
				}
				64% {
					transform: translateY(0) scale(1);
				}
			}

			@keyframes text-glow {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.74;
				}
			}

			.logo-anim-root {
				animation: logo-float 2.1s cubic-bezier(0.32, 0, 0.28, 1) infinite;
				transform-box: fill-box;
				transform-origin: 50% 45%;
			}

			.logo-cell {
				animation: cell-bob 1.65s cubic-bezier(0.32, 0, 0.28, 1) infinite;
				transform-box: fill-box;
			}

			/* чуть выше центра — баланс между «живым» scale и обрезкой сверху */
			.logo-cell--1 {
				transform-origin: 20px 10px;
				animation-delay: 0s;
			}
			.logo-cell--2 {
				transform-origin: 68px 10px;
				animation-delay: 0.08s;
			}
			.logo-cell--3 {
				transform-origin: 116px 10px;
				animation-delay: 0.16s;
			}
			.logo-cell--4 {
				transform-origin: 164px 10px;
				animation-delay: 0.24s;
			}
			.logo-cell--5 {
				transform-origin: 212px 10px;
				animation-delay: 0.32s;
			}

			.logo-text {
				animation: text-glow 1.75s cubic-bezier(0.32, 0, 0.28, 1) infinite;
				animation-delay: 0.1s;
				transform-origin: 116px 70px;
				transform-box: fill-box;
			}
		</style>
	</defs>

