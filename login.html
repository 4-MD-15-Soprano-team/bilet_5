<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Вход — We are sysadmins</title>
		<link rel="stylesheet" href="css/auth.css" />
	</head>
	<body class="auth-page">
		<a href="index.html" class="auth-back">← На главную</a>

		<div class="auth-box">
			<h1 class="auth-title">Вход</h1>
			<form class="auth-form" id="auth-form-login">
				<div class="auth-field">
					<label class="auth-label" for="login-email">Email</label>
					<input type="email" id="login-email" name="email" class="auth-input" placeholder="Email" />
				</div>
				<div class="auth-field">
					<label class="auth-label" for="login-password">Пароль</label>
					<div class="auth-password-wrap">
						<input type="password" id="login-password" name="password" class="auth-input" placeholder="Пароль" />
						<button type="button" class="auth-password-toggle" id="login-password-toggle" aria-label="Показать пароль" title="Показать пароль">
							<svg class="auth-password-icon auth-password-icon-eye" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none;">
								<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
								<circle cx="12" cy="12" r="3"/>
							</svg>
							<svg class="auth-password-icon auth-password-icon-eye-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
								<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
								<line x1="1" y1="1" x2="23" y2="23"/>
							</svg>
						</button>
					</div>
				</div>
				<button type="submit" class="auth-submit">Войти</button>
			</form>
			<p class="auth-link-wrap">
				<a href="register.html" class="auth-link">Нет аккаунта? Зарегистрироваться</a>
			</p>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="js/supabase-config.js"></script>
		<script src="js/auth-login.js"></script>
	</body>
</html>
