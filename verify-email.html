<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Проверьте почту — We are sysadmins</title>
		<link rel="stylesheet" href="css/auth.css" />
	</head>
	<body class="auth-page">
		<div class="auth-box auth-verify-box">
			<h1 class="auth-title">Проверьте почту</h1>
			<p class="auth-verify-text" id="verifyMessage">
				Для подтверждения регистрации мы отправили письмо на вашу почту. Перейдите по ссылке из письма, затем обновите эту страницу — вы попадёте в личный кабинет.
			</p>
			<div class="auth-verify-actions">
				<a href="index.html" class="btn-verify-back" id="verifyBack">Назад</a>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="js/supabase-config.js"></script>
		<script>
			(function () {
				if (typeof window.supabase === 'undefined' || !window.SUPABASE_URL) return;
				var supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
				supabase.auth.getUser().then(function (res) {
					var user = res.data && res.data.user;
					if (user) {
						window.location.href = 'profile.html';
					}
				});
			})();
		</script>
	</body>
</html>
