<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Регистрация — We are sysadmins</title>
		<link rel="stylesheet" href="css/auth.css" />
	</head>
	<body class="auth-page">
		<a href="index.html" class="auth-back">← На главную</a>

		<div class="auth-box">
			<h1 class="auth-title">Регистрация</h1>
			<form class="auth-form" id="auth-form-register">
				<div class="auth-field">
					<label class="auth-label" for="reg-name">Имя</label>
					<input type="text" id="reg-name" name="name" class="auth-input" placeholder="Ваше имя" />
				</div>
				<div class="auth-field">
					<label class="auth-label" for="reg-email">Email</label>
					<input type="email" id="reg-email" name="email" class="auth-input" placeholder="ваш email" />
				</div>
				<div class="auth-field">
					<label class="auth-label" for="reg-phone">Номер телефона</label>
					<input type="tel" id="reg-phone" name="phone" class="auth-input" placeholder="+7 (900) 000-00-00" />
				</div>
				<div class="auth-field">
					<label class="auth-label" for="reg-password">Пароль</label>
					<div class="auth-password-wrap">
						<input type="password" id="reg-password" name="password" class="auth-input" placeholder="Пароль" />
						<button type="button" class="auth-password-toggle" id="reg-password-toggle" aria-label="Показать пароль" title="Показать пароль">
							<svg class="auth-password-icon auth-password-icon-eye" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none;">
								<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
								<circle cx="12" cy="12" r="3"/>
							</svg>
							<svg class="auth-password-icon auth-password-icon-eye-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
								<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
								<line x1="1" y1="1" x2="23" y2="23"/>
							</svg>
						</button>
					</div>
				</div>
				<button type="submit" class="auth-submit">Зарегистрироваться</button>
			</form>
			<p class="auth-link-wrap">
				<a href="login.html" class="auth-link">У вас уже есть аккаунт?</a>
			</p>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="js/supabase-config.js"></script>
		<script src="js/auth-register.js"></script>
	</body>
</html>
